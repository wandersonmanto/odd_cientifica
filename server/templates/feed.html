<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Feed — Seleção do Dia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1350px;
      font-family: 'Inter', Arial, sans-serif;
      background:
        radial-gradient(ellipse 900px 600px at 50% -80px, rgba(0,240,168,.18), transparent),
        linear-gradient(180deg, #06090e 0%, #0b1118 60%, #080d13 100%);
      color: #fff;
      overflow: hidden;
    }

    .page {
      width: 1080px;
      height: 1350px;
      padding: 52px 56px 40px;
      position: relative;
    }

    /* Grid overlay sutil */
    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,240,168,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,168,.035) 1px, transparent 1px);
      background-size: 54px 54px;
      pointer-events: none;
    }

    /* Borda verde no topo */
    .page::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00f0a8 40%, #00f0a8 60%, transparent);
      border-radius: 0 0 4px 4px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand-logo {
      width: 72px; height: 72px;
      border-radius: 16px;
      background: #0e1621;
      border: 1px solid rgba(0,240,168,.35);
      box-shadow: 0 0 22px rgba(0,240,168,.22);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    .brand-logo img { width: 100%; height: 100%; object-fit: cover; }

    .brand-text h1 {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: .3px;
      line-height: 1;
    }

    .brand-text h1 span { color: #00f0a8; }

    .brand-text p {
      font-size: 13px;
      color: #5a7390;
      margin-top: 4px;
      font-weight: 500;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .date-badge {
      background: rgba(0,240,168,.07);
      border: 1px solid rgba(0,240,168,.25);
      border-radius: 14px;
      padding: 12px 22px;
      text-align: center;
    }

    .date-badge .day { font-size: 42px; font-weight: 900; color: #00f0a8; line-height: 1; }
    .date-badge .month { font-size: 15px; color: #6a8fa8; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

    /* ── Hero title ── */
    .hero { margin-bottom: 30px; }
    .hero h2 {
      font-size: 52px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -.5px;
    }
    .hero h2 em { color: #00f0a8; font-style: normal; }
    .hero p { font-size: 19px; color: #5c7a93; margin-top: 8px; font-weight: 500; }

    /* ── Games list ── */
    .list {
      border: 1px solid rgba(0,240,168,.2);
      border-radius: 24px;
      background: rgba(255,255,255,.025);
      box-shadow: 0 0 40px rgba(0,240,168,.09), inset 0 1px 0 rgba(255,255,255,.04);
      overflow: hidden;
    }

    .list-header {
      padding: 16px 28px;
      background: rgba(0,240,168,.06);
      border-bottom: 1px solid rgba(0,240,168,.15);
      font-size: 13px;
      font-weight: 700;
      color: #00f0a8;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .game {
      display: grid;
      grid-template-columns: 120px 1fr 160px;
      gap: 20px;
      align-items: center;
      padding: 22px 28px;
      border-bottom: 1px solid rgba(255,255,255,.055);
      transition: background .15s;
    }

    .game:last-child { border-bottom: none; }

    .hora {
      font-size: 26px;
      font-weight: 800;
      color: #c8f0e2;
      background: rgba(0,240,168,.07);
      border: 1px solid rgba(0,240,168,.2);
      border-radius: 12px;
      padding: 11px 14px;
      text-align: center;
      letter-spacing: .5px;
    }

    .info .partida {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 7px;
      line-height: 1.2;
    }

    .info .mercado {
      font-size: 20px;
      color: #00f0a8;
      font-weight: 700;
    }

    .info .liga {
      font-size: 15px;
      color: #4a6477;
      margin-top: 5px;
      font-weight: 500;
    }

    .odd-box {
      text-align: center;
      background: rgba(0,240,168,.08);
      border: 1px solid rgba(0,240,168,.3);
      border-radius: 16px;
      padding: 16px 12px;
      box-shadow: inset 0 0 20px rgba(0,240,168,.06);
    }

    .odd-box .label { font-size: 12px; color: #4a6c80; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }
    .odd-box .value { font-size: 34px; font-weight: 900; color: #00ffb0; margin-top: 4px; line-height: 1; }

    /* ── Footer ── */
    .footer {
      position: absolute;
      left: 56px; right: 56px; bottom: 34px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer .left { font-size: 16px; color: #344d60; font-weight: 500; }
    .footer .handle {
      font-size: 18px;
      font-weight: 700;
      color: #00f0a8;
      opacity: .7;
      letter-spacing: .3px;
    }
    .footer .disclaimer {
      font-size: 13px;
      color: #263848;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="header">
      <div class="brand">
        <div class="brand-logo">
          <img src="{{LOGO_URL}}" alt="Logo" onerror="this.style.display='none'" />
        </div>
        <div class="brand-text">
          <h1>ODD <span>CIENTÍFICA</span></h1>
          <p>Análise Estatística de Apostas</p>
        </div>
      </div>
      <div class="date-badge">
        <div class="day">{{DATA_DIA}}</div>
        <div class="month">{{DATA_MES}}</div>
      </div>
    </div>

    <div class="hero">
      <h2>Seleção de Jogos <em>do Dia</em> ⚽</h2>
      <p>Picks selecionados com base em análise estatística avançada</p>
    </div>

    <div class="list">
      <div class="list-header">
        <span>📋 {{TOTAL_PICKS}} Picks Selecionados</span>
        <span>{{DATA_TEXTO}}</span>
      </div>
      {{JOGOS_HTML}}
    </div>

    <div class="footer">
      <div class="left">Dados analisados por IA</div>
      <div class="handle">@oddcientifica</div>
      <div class="disclaimer">Jogue com responsabilidade</div>
    </div>

  </div>
</body>
</html>

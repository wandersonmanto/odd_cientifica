<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Story — Seleção do Dia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1920px;
      font-family: 'Inter', Arial, sans-serif;
      background:
        radial-gradient(ellipse 1000px 700px at 50% -100px, rgba(0,240,168,.22), transparent),
        radial-gradient(ellipse 600px 400px at 80% 110%, rgba(0,180,255,.08), transparent),
        linear-gradient(180deg, #05080c 0%, #090e15 50%, #060a10 100%);
      color: #fff;
      overflow: hidden;
    }

    .page {
      width: 1080px;
      height: 1920px;
      padding: 80px 60px 60px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Grid overlay */
    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,240,168,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,168,.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Linha topo */
    .page::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, #00f0a8 30%, #00f0a8 70%, transparent);
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 22px;
      margin-bottom: 50px;
    }

    .logo-wrap {
      width: 90px; height: 90px;
      border-radius: 20px;
      background: #0e1621;
      border: 1px solid rgba(0,240,168,.4);
      box-shadow: 0 0 28px rgba(0,240,168,.25);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .brand h1 { font-size: 40px; font-weight: 900; line-height: 1; }
    .brand h1 span { color: #00f0a8; }
    .brand p { font-size: 15px; color: #4a6880; margin-top: 5px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; }

    /* ── Hero ── */
    .hero {
      margin-bottom: 48px;
    }

    .hero .eyebrow {
      font-size: 16px;
      font-weight: 700;
      color: #00f0a8;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero .eyebrow::before {
      content: '';
      display: inline-block;
      width: 28px; height: 2px;
      background: #00f0a8;
    }

    .hero h2 {
      font-size: 80px;
      font-weight: 900;
      line-height: .95;
      letter-spacing: -1.5px;
    }

    .hero h2 em { color: #00f0a8; font-style: normal; display: block; }

    .hero .date {
      font-size: 22px;
      color: #4a6880;
      margin-top: 16px;
      font-weight: 600;
    }

    /* ── Cards ── */
    .cards { display: flex; flex-direction: column; gap: 20px; flex: 1; }

    .card {
      background: rgba(255,255,255,.028);
      border: 1px solid rgba(0,240,168,.18);
      border-radius: 28px;
      padding: 30px 32px;
      box-shadow: 0 0 28px rgba(0,240,168,.08);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hora {
      font-size: 26px;
      font-weight: 800;
      color: #b0ead1;
      background: rgba(0,240,168,.07);
      border: 1px solid rgba(0,240,168,.18);
      border-radius: 10px;
      padding: 8px 18px;
    }

    .card-odd {
      font-size: 38px;
      font-weight: 900;
      color: #00ffb0;
    }

    .partida {
      font-size: 36px;
      font-weight: 800;
      line-height: 1.15;
    }

    .mercado {
      font-size: 24px;
      color: #00f0a8;
      font-weight: 700;
    }

    .liga {
      font-size: 16px;
      color: #3d5568;
      font-weight: 500;
    }

    /* ── CTA ── */
    .cta {
      margin-top: auto;
      padding-top: 40px;
      text-align: center;
    }

    .cta p {
      font-size: 26px;
      font-weight: 700;
      color: #c8dde8;
      line-height: 1.35;
      margin-bottom: 20px;
    }

    .cta .handle {
      font-size: 22px;
      font-weight: 800;
      color: #00f0a8;
      opacity: .75;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="header">
      <div class="logo-wrap">
        <img src="{{LOGO_URL}}" alt="Logo" onerror="this.style.display='none'" />
      </div>
      <div class="brand">
        <h1>ODD <span>CIENTÍFICA</span></h1>
        <p>Análise Estatística</p>
      </div>
    </div>

    <div class="hero">
      <div class="eyebrow">Picks do Dia</div>
      <h2>Seleção <em>do Dia ⚽</em></h2>
      <div class="date">{{DATA_TEXTO}}</div>
    </div>

    <div class="cards">
      {{JOGOS_HTML}}
    </div>

    <div class="cta">
      <p>Volte mais tarde para ver o resultado 👀<br/>GREEN ou RED?</p>
      <div class="handle">@oddcientifica</div>
    </div>

  </div>
</body>
</html>

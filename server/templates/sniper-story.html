<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Sniper Story</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1920px;
      font-family: 'Inter', Arial, sans-serif;
      background:
        radial-gradient(ellipse 1000px 700px at 50% -100px, rgba(255,102,0,.26), transparent),
        radial-gradient(ellipse 600px 400px at 80% 110%, rgba(255,140,0,.1), transparent),
        linear-gradient(180deg, #0a0503 0%, #110904 50%, #0d0703 100%);
      color: #fff;
      overflow: hidden;
    }

    .page {
      width: 1080px;
      height: 1920px;
      padding: 72px 58px 56px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,102,0,.032) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,102,0,.032) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .page::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, #FF6600 30%, #FF8C00 70%, transparent);
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .logo-wrap {
      width: 82px; height: 82px;
      border-radius: 18px;
      background: #1a0900;
      border: 1px solid rgba(255,102,0,.45);
      box-shadow: 0 0 24px rgba(255,102,0,.28);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .brand h1 { font-size: 38px; font-weight: 900; line-height: 1; }
    .brand h1 span { color: #FF6600; }
    .brand p { font-size: 14px; color: #5a3010; margin-top: 5px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; }

    /* ── Hero ── */
    .hero { margin-bottom: 38px; }

    .hero .eyebrow {
      font-size: 16px;
      font-weight: 700;
      color: #FF6600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero .eyebrow::before {
      content: '';
      display: inline-block;
      width: 28px; height: 2px;
      background: #FF6600;
    }

    .hero h2 {
      font-size: 72px;
      font-weight: 900;
      line-height: .92;
      letter-spacing: -1.5px;
    }
    .hero h2 em { color: #FF6600; font-style: normal; display: block; }

    .hero .date { font-size: 20px; color: #5a3010; margin-top: 14px; font-weight: 600; }

    /* ── Cards ── */
    .cards { display: flex; flex-direction: column; gap: 14px; flex: 1; }

    .card {
      background: rgba(255,255,255,.022);
      border: 1px solid rgba(255,102,0,.18);
      border-radius: 22px;
      padding: 20px 26px;
      box-shadow: 0 0 22px rgba(255,102,0,.08);
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 18px;
      align-items: center;
    }

    .time-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .hora {
      width: 100%;
      font-size: 26px;
      font-weight: 800;
      color: #f5c8a0;
      background: rgba(255,102,0,.09);
      border: 1px solid rgba(255,102,0,.22);
      border-radius: 12px;
      padding: 10px 10px;
      text-align: center;
    }

    .odd-small {
      font-size: 16px;
      font-weight: 700;
      color: #FF8C00;
      opacity: .9;
    }

    .info { min-width: 0; }

    .partida {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mercado {
      font-size: 20px;
      color: #FF6600;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .liga {
      font-size: 20px;
      color: #5a3820;
      font-weight: 500;
    }

    /* ── CTA ── */
    .cta {
      margin-top: 26px;
      text-align: center;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,.05);
    }
    .cta p { font-size: 24px; font-weight: 700; color: #b0c8d8; line-height: 1.35; margin-bottom: 14px; }
    .cta .handle { font-size: 20px; font-weight: 800; color: #FF6600; opacity: .75; }
    .cta .page-info { font-size: 14px; color: #3a1a06; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="page">

    <div class="header">
      <div class="logo-wrap">
        <img src="{{LOGO_URL}}" alt="Logo" onerror="this.style.display='none'" />
      </div>
      <div class="brand">
        <h1>ODD <span>CIENTÍFICA</span></h1>
        <p>Análise Estatística</p>
      </div>
    </div>

    <div class="hero">
      <div class="eyebrow">Sniper List — Parte {{PAGE_NUM}}/{{PAGE_TOTAL}}</div>
      <h2>🎯 <em>Sniper List</em></h2>
      <div class="date">{{DATA_TEXTO}}</div>
    </div>

    <div class="cards">
      {{JOGOS_HTML}}
    </div>

    <div class="cta">
      <p>Favoritos dominantes do dia 🎯<br/>GREEN ou RED?</p>
      <div class="handle">@oddcientifica</div>
      {{#if_multi}}<div class="page-info">{{TOTAL_PICKS}} picks no total • Parte {{PAGE_NUM}} de {{PAGE_TOTAL}}</div>{{/if_multi}}
    </div>

  </div>
</body>
</html>
